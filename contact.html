<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Jinnov</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">Jinnov</a>
            <nav class="nav-menu">
                <a href="index.html#services">Nos Services</a>
                <a href="index.html#about">À Propos</a>
                <a href="evenementiel.html">Événements</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <section class="contact-section">
        <h2 class="section-title">Contactez-nous</h2>
        <div class="contact-form">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Téléphone</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="form-group">
                    <label for="event-type">Type d'événement</label>
                    <select id="event-type" name="event-type" required>
                        <option value="">Sélectionnez un type d'événement</option>
                        <option value="corporate">Événement d'entreprise</option>
                        <option value="private">Soirée privée</option>
                        <option value="festival">Festival / Concert</option>
                        <option value="exhibition">Salon professionnel</option>
                        <option value="other">Autre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Votre message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Envoyer le message</button>
            </form>
        </div>

        <div class="contact-info">
            <div class="contact-info-item">
                <i class="fas fa-map-marker-alt"></i>
                <p>123 Avenue des Événements<br>75000 Paris, France</p>
            </div>
            <div class="contact-info-item">
                <i class="fas fa-phone"></i>
                <p>+33 (0)1 23 45 67 89</p>
            </div>
            <div class="contact-info-item">
                <i class="fas fa-envelope"></i>
                <p>contact@jinnov.fr</p>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h4>Contact</h4>
                <p>Email: contact@jinnov.fr</p>
                <p>Tél: +33 (0)1 23 45 67 89</p>
            </div>
            <div class="footer-section">
                <h4>Suivez-nous</h4>
                <div class="social-links">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                </div>
            </div>
            <div class="footer-section">
                <h4>Adresse</h4>
                <p>123 Avenue des Événements</p>
                <p>75000 Paris, France</p>
            </div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
